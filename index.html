<html lang="en">

    <title>Document</title>

<body>
    <header>
        <h1>Cadastro Perfil</h1>
    </header>
    <main> 
        <form action="www.google.com" method="get">

            <div class="cadastro">
            <label for = "nome">Nome:</label>
            <input required type="text" name="nome" id="nome">
            <br><br>
            <label for="descricao">Descrição</label>
            <br>    
            <textarea name="descricao" cols="28" rows="8" id="descricao">Descreva sobre Você</textarea>
            <br><br>
            <input required type="radio" name="genero" value="m">Masculino
            <input required type="radio" name="genero" value="f">Feminino
        </div>
        <br>
        <input type="submit" name="Enviar">
        </form>
        <button id="editar">Editar</button>
    </main>
    <br>

    </footer>
    <script src="script.js"></script>
</body>
</html>
